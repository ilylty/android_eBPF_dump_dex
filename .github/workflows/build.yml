name: Build Android eBPF Dex Dumper

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential linux-tools-common linux-tools-$(uname -r)

      - name: Generate vmlinux.h
        run: |
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > vmlinux.h

      - name: Compile eBPF bytecode
        run: |
          clang -target bpf \
            -D__TARGET_ARCH_arm64 \
            -I. \
            -O2 -g -c dex_dump.bpf.c -o dex_dump.bpf.o

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Build Go loader for Android ARM64
        run: |
          go mod tidy
          env CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o dex_dump_bin main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-ebpf-dex-dumper
          path: |
            dex_dump.bpf.o
            dex_dump_bin
